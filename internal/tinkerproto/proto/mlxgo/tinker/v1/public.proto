syntax = "proto3";

package mlxgo.tinker.v1;

option go_package = "github.com/tmc/mlx-go/internal/tinkerproto/tinkerv1";

// Public client-wire messages for the forward/backward proto path. These mirror
// the upstream Tinker SDK's tinker_public proto (consumed over plain HTTP at
// POST /api/v1/forward_backward with Content-Type: application/x-protobuf), and
// are kept separate from the internal coordinator/node RPC messages in
// common.proto. Field numbers match upstream so the SDK's encoded bytes decode
// directly.

// DType is the public wire dtype. Integer widths collapse to int64 and bfloat16
// to float32 when decoded into the JSON-equivalent TensorData.
enum DType {
  DTYPE_UNSPECIFIED = 0;
  DTYPE_FLOAT32 = 1;
  DTYPE_INT64 = 2;
  DTYPE_INT32 = 3;
  DTYPE_BFLOAT16 = 4;
}

// SparseCsr holds a CSR-encoded tensor. values are in the tensor dtype;
// crow_indices and col_indices are int64.
message SparseCsr {
  bytes values = 1;
  bytes crow_indices = 2;
  bytes col_indices = 3;
}

// Tensor is one loss_fn_inputs value, either dense bytes or a sparse CSR
// encoding.
message Tensor {
  oneof encoding {
    bytes dense = 1;
    SparseCsr sparse_csr = 2;
  }
  DType dtype = 3;
  repeated int64 shape = 4;
}

// BatchedTensor packs one field across all datums: data is the concatenated
// per-datum bytes, offsets are int64 byte offsets, and trailing_shape is the
// per-element shape after the leading datum dimension.
message BatchedTensor {
  bytes data = 1;
  bytes offsets = 2;
  DType dtype = 3;
  repeated int64 trailing_shape = 4;
}

// ArrayRecord is one structured output field-set. num_datums is authoritative
// for the datum count (it survives server-side field stripping).
message ArrayRecord {
  string type_tag = 1;
  map<string, BatchedTensor> fields = 2;
  int64 num_datums = 3;
}

// ForwardBackwardOutput is the proto response shape. localtinker decodes the
// request proto but still replies JSON, so this is defined for completeness and
// the eventual proto response path.
message ForwardBackwardOutput {
  string loss_fn_output_type = 1;
  repeated ArrayRecord loss_fn_outputs = 2;
  map<string, double> metrics = 3;
}

// EncodedTextChunk carries int32 token ids packed as bytes.
message EncodedTextChunk {
  bytes tokens = 1;
}

// ImageChunk carries a raw image; the server computes width/height/tokens.
message ImageChunk {
  bytes data = 1;
  string format = 2;
  optional int32 expected_tokens = 3;
}

// Chunk is one model_input element.
message Chunk {
  oneof chunk {
    EncodedTextChunk encoded_text = 1;
    ImageChunk image = 2;
  }
}

// Datum is one training example: a model input and its loss_fn_inputs tensors.
message Datum {
  repeated Chunk model_input = 1;
  map<string, Tensor> loss_fn_inputs = 2;
}

// ForwardBackwardRequest is the proto body for POST /api/v1/forward_backward.
// When forward_only is true the server runs the forward pass only.
message ForwardBackwardRequest {
  string model_id = 1;
  int32 seq_id = 2;
  repeated Datum data = 3;
  string loss_fn = 4;
  map<string, double> loss_fn_config = 5;
  bool forward_only = 6;
}
